<html lang="en">

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:#c4dff0;overflow:hidden;font-family:'DM Sans',sans-serif;color:#1a1a1a}
    canvas{display:block;cursor:grab}canvas:active{cursor:grabbing}

    #title{position:fixed;top:24px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:20;transition:opacity .4s}
    #title .ey{font-size:.46rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(248,175,33,.7);margin-bottom:5px}
    #title h1{font-family:'DM Serif Display',serif;font-size:clamp(1.1rem,2.4vw,1.9rem);font-weight:400;color:#1a3040;line-height:1}
    #title .sub{margin-top:5px;font-size:.48rem;letter-spacing:.12em;color:rgba(26,48,64,.22)}
    body.z #title{opacity:0}

    #infoCard{position:fixed;right:32px;top:50%;width:340px;background:#fff;border-radius:14px;box-shadow:0 10px 44px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.03);padding:28px 26px 22px;z-index:50;opacity:0;pointer-events:none;transform:translateY(-50%) translateX(46px)}
    #infoCard.vis{pointer-events:auto}
    .cn{font-size:.52rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#F8AF21;margin-bottom:5px}
    .ct{font-family:'DM Serif Display',serif;font-size:1.4rem;color:#1a2a2a;line-height:1.15;margin-bottom:3px}
    .cp{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#5a9ab5;margin-bottom:12px}
    .cd{display:inline-block;font-size:.48rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;background:#eef6fa;color:rgba(26,48,64,.4);padding:4px 11px;border-radius:4px;margin-bottom:12px}
    .cx{font-size:.82rem;font-weight:300;line-height:1.85;color:rgba(26,26,26,.5);margin-bottom:18px}
    .cv{display:flex;gap:7px;align-items:center;padding-top:12px;border-top:1px solid rgba(0,0,0,.05)}
    .cv button{font-family:'DM Sans',sans-serif;font-size:.52rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border:none;cursor:pointer;padding:7px 14px;border-radius:5px;transition:all .2s}
    .bg{background:#1a3040;color:#eef6fa}.bg:hover{background:#2a4050}.bg:disabled{background:#ddd;color:#aaa;cursor:not-allowed}
    .bx{background:transparent;color:rgba(26,26,26,.3);margin-left:auto}.bx:hover{color:rgba(26,26,26,.6)}

    #lbl{position:fixed;inset:0;pointer-events:none;z-index:15}
    .pl{position:absolute;white-space:nowrap;transition:opacity .3s}
    .pl span{font-size:.46rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#e8524a;background:#fff;padding:2px 8px;border-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;pointer-events:auto}

    #prog{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:20}
    .dt{width:7px;height:7px;border-radius:50%;background:rgba(26,48,64,.12);border:none;cursor:pointer;transition:all .3s;padding:0}
    .dt.a{background:#F8AF21;transform:scale(1.3)}.dt:hover{background:rgba(248,175,33,.5)}

    #hint{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);font-size:.46rem;letter-spacing:.15em;text-transform:uppercase;color:rgba(26,48,64,.16);pointer-events:none;z-index:20;transition:opacity .4s}

    @media(max-width:768px){
      #infoCard{right:50%;top:auto;bottom:16px;width:92vw;transform:translateX(50%) translateY(28px);border-radius:12px}
      #infoCard.vis{transform:translateX(50%) translateY(0)}
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title"><p class="ey">ASOG-TBI · The ALTITUDE Program</p><h1>The Journey to Summit</h1><p class="sub">Click a flag to explore each stage</p></div>
<div id="lbl"></div>
<div id="infoCard">

</div>
<div id="prog"><button class="dt" data-i="0"></button><button class="dt" data-i="1"></button><button class="dt" data-i="2"></button><button class="dt" data-i="3"></button></div>
<p id="hint">Click a flag to explore · Drag to orbit</p>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ── Stage data ── */
const S = [
  { id:'01', n:'Trailhead', p:'Pre-Incubation', d:'Month 1',
    x:'The starting point. Teams undergo orientation, needs assessment, and initial mentoring to prepare for the climb ahead.',
    pos: new THREE.Vector3(2.0, 2.4, 3.0) },
  { id:'02', n:'Basecamp', p:'Incubation Phase', d:'Months 2\u20134',
    x:'Deep work begins. Startups access labs, receive technical mentorship, develop prototypes, and validate their business models.',
    pos: new THREE.Vector3(-1.0, 2.8, 2.5) },
  { id:'03', n:'Ascent', p:'Post-Incubation', d:'Months 5\u20136',
    x:'Scaling up. Teams refine products, connect with investors, and prepare for market entry with continued support.',
    pos: new THREE.Vector3(-3.2, 3.8, 0.0) },
  { id:'04', n:'Summit', p:'Graduation & Beyond', d:'Post-Program',
    x:'The peak. Startups graduate as market-ready ventures, joining the ASOG-TBI alumni network with ongoing advisory access.',
    pos: new THREE.Vector3(-0.5, 6.2, -1.6) },
];

/* ── Renderer ── */
const cv = document.getElementById('c');
const R = new THREE.WebGLRenderer({ canvas:cv, antialias:true });
R.setPixelRatio(Math.min(devicePixelRatio,2));
R.setSize(innerWidth,innerHeight);
R.shadowMap.enabled = true;
R.shadowMap.type = THREE.PCFSoftShadowMap;
R.toneMapping = THREE.ACESFilmicToneMapping;
R.toneMappingExposure = 1.15;

/* ── Scene ── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc4dff0);
scene.fog = new THREE.Fog(0xc4dff0, 35, 65);

/* ── Camera ── */
const cam = new THREE.PerspectiveCamera(36, innerWidth/innerHeight, 0.1, 200);
const OVP = new THREE.Vector3(14, 10, 16);
const OVT = new THREE.Vector3(0, 2.5, 0);
cam.position.copy(OVP);

const oc = new OrbitControls(cam, cv);
oc.enableDamping = true; oc.dampingFactor = 0.06;
oc.minDistance = 8; oc.maxDistance = 30;
oc.maxPolarAngle = Math.PI/2.1;
oc.target.copy(OVT); oc.update();

/* ── Lights ── */
scene.add(new THREE.HemisphereLight(0xdceef8, 0x8ab0c4, 0.65));
scene.add(new THREE.AmbientLight(0xffffff, 0.35));
const sun = new THREE.DirectionalLight(0xfffaf0, 1.5);
sun.position.set(7, 16, 9);
sun.castShadow = true;
sun.shadow.mapSize.set(1024,1024);
sun.shadow.camera.far = 45;
sun.shadow.camera.left = -14; sun.shadow.camera.right = 14;
sun.shadow.camera.top = 18; sun.shadow.camera.bottom = -4;
sun.shadow.bias = -0.0005;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xb0d0e0, 0.35);
fill.position.set(-5, 5, -3);
scene.add(fill);

/* ── Materials ── */
const mW = new THREE.MeshStandardMaterial({color:0xeef2f5, roughness:0.78});
const mT = new THREE.MeshStandardMaterial({color:0x4a8da0, roughness:0.68});
const mTL= new THREE.MeshStandardMaterial({color:0x5699ac, roughness:0.68});
const mPl= new THREE.MeshStandardMaterial({color:0x9ac4d6, roughness:0.6, metalness:0.05});
const mPr= new THREE.MeshStandardMaterial({color:0x84b8cc, roughness:0.5, metalness:0.08});
const mBr= new THREE.MeshStandardMaterial({color:0x7a5836, roughness:0.7, metalness:0.1});
const mRd= new THREE.MeshStandardMaterial({color:0xe85040, roughness:0.35, side:THREE.DoubleSide});
const mGd= new THREE.MeshStandardMaterial({color:0xF8AF21, roughness:0.3, metalness:0.35});
const mG1= new THREE.MeshStandardMaterial({color:0x3a5a20, roughness:0.82});
const mG2= new THREE.MeshStandardMaterial({color:0x4a6e2a, roughness:0.82});

/* ── Master group ── */
const G = new THREE.Group();
scene.add(G);

/* ════════════════════════════════════════════════════════════
   MOUNTAIN — Wide squat peaks with thick glacier-drape snow
   Peaks are short & wide, NOT tall skinny cones.
   Snow covers ~50% and DRAPES down smoothly — part of the shape.
   ════════════════════════════════════════════════════════════ */

/**
 * Build a wide, squat mountain peak with glacier-style snow.
 * @param {number} bR  - base radius (wide!)
 * @param {number} h   - total height (keep moderate)
 * @param {number} sf  - snow fraction (0.5 = snow covers top half)
 * @param {number} seg - lathe segments
 */
function peak(bR, h, sf, seg) {
  seg = seg || 40;
  const snowLine = 1.0 - sf;

  // Radius profile: wide power curve — NOT a straight line taper
  // Power < 1 gives a wide base that stays thick longer before tapering
  function R(t) {
    return bR * Math.pow(Math.max(1 - t, 0), 0.65) * (1 + 0.1 * Math.sin(t * Math.PI));
  }

  // ── TEAL BASE ──
  const tPts = [];
  for (let i = 0; i <= 50; i++) {
    const t = (i / 50) * snowLine;
    tPts.push(new THREE.Vector2(Math.max(R(t), 0.001), t * h));
  }
  const tGeo = new THREE.LatheGeometry(tPts, seg);
  const tM = new THREE.Mesh(tGeo, mT);
  tM.castShadow = tM.receiveShadow = true;

  // ── SNOW GLACIER — thick draping, part of the mountain ──
  // The snow starts at snowLine and covers to summit.
  // It bulges OUT wider than the teal (thick icing drape) then
  // smoothly rounds into a fat dome at the top.
  const sPts = [];
  const SN = 70;
  const joinR = R(snowLine);

  for (let i = 0; i <= SN; i++) {
    const f = i / SN;
    const t = snowLine + f * (1 - snowLine);
    const coneR = R(t);

    // Thick drape: at the join, snow overshoots the teal radius
    // then gradually tapers. Uses smooth cubic falloff.
    const drape = joinR * 0.22 * Math.pow(Math.max(1 - f, 0), 2.0);

    // Dome rounding: from ~30% up, blend into a hemisphere shape
    let r;
    if (f < 0.3) {
      // Near join — follow cone + thick drape
      r = coneR + drape;
    } else {
      // Transition to dome
      const domeF = (f - 0.3) / 0.7;
      const flatR = coneR + drape;
      // Dome radius: a half-circle that terminates at the summit
      const domeR = joinR * 0.5 * Math.cos(domeF * Math.PI * 0.5);
      // Smooth blend between draping shape and dome
      const blend = domeF * domeF * (3 - 2 * domeF); // smoothstep
      r = flatR * (1 - blend) + domeR * blend;
    }

    sPts.push(new THREE.Vector2(Math.max(r, 0.01), t * h));
  }

  // Round dome cap on top
  const capR = sPts[sPts.length - 1].x;
  const capY = sPts[sPts.length - 1].y;
  for (let i = 1; i <= 20; i++) {
    const a = (i / 20) * Math.PI * 0.5;
    sPts.push(new THREE.Vector2(
      Math.max(capR * Math.cos(a), 0.001),
      capY + capR * 0.6 * Math.sin(a)
    ));
  }

  const sGeo = new THREE.LatheGeometry(sPts, seg);
  const sM = new THREE.Mesh(sGeo, mW);
  sM.castShadow = sM.receiveShadow = true;

  const grp = new THREE.Group();
  grp.add(tM);
  grp.add(sM);
  return grp;
}

/* Half-sphere snowy hill */
function hill(rx, ry, rz) {
  const g = new THREE.SphereGeometry(1, 36, 24, 0, Math.PI * 2, 0, Math.PI * 0.5);
  const m = new THREE.Mesh(g, mW);
  m.scale.set(rx, ry, rz);
  m.castShadow = m.receiveShadow = true;
  return m;
}

/* ─── BASE PLATE ─── */
const plate = new THREE.Mesh(new THREE.CylinderGeometry(8.2, 8.5, 0.3, 64), mPl);
plate.position.y = -0.15;
plate.receiveShadow = true;
G.add(plate);
const rim = new THREE.Mesh(new THREE.TorusGeometry(8.35, 0.22, 12, 64), mPr);
rim.rotation.x = Math.PI / 2;
rim.position.y = 0.0;
G.add(rim);

/* ─── MAIN PEAK (center-back) — WIDE, moderate height ─── */
const pk1 = peak(3.4, 6.5, 0.50, 44);
pk1.position.set(-0.5, 0, -1.8);
G.add(pk1);

/* ─── LEFT PEAK — shorter, wide ─── */
const pk2 = peak(3.0, 5.0, 0.50, 40);
pk2.position.set(-3.5, 0, 0.0);
G.add(pk2);

/* ─── RIGHT PEAK — smallest, still wide ─── */
const pk3 = peak(2.4, 4.2, 0.50, 36);
pk3.position.set(2.8, 0, -1.4);
G.add(pk3);

/* ─── BIG FRONT SNOWY HILL (dominant foreground blob) ─── */
const fh = hill(5.0, 3.0, 4.2);
fh.position.set(0.0, 0, 3.0);
G.add(fh);

/* Secondary front-right bump */
const fb = hill(2.4, 1.8, 2.2);
fb.position.set(3.2, 0, 2.4);
G.add(fb);

/* Snow bridge connecting front hill to back peaks */
const br = hill(3.4, 2.4, 3.0);
br.position.set(-0.5, 0, 0.8);
G.add(br);

/* Left side bump */
const leftBump = hill(2.2, 1.6, 2.0);
leftBump.position.set(-4.5, 0, 2.0);
G.add(leftBump);

/* Snow patch between peaks */
const sp = hill(2.0, 1.0, 1.8);
sp.position.set(1.2, 0, -0.2);
G.add(sp);

/* ════════════════════════════════════════════════════════════
   TRAIL — stepping stones that follow the terrain surface
   ════════════════════════════════════════════════════════════ */
const TP = [
  new THREE.Vector3( 4.8, 0.2,  3.2),
  new THREE.Vector3( 3.4, 1.2,  3.2),
  new THREE.Vector3( 2.0, 2.2,  3.0),
  new THREE.Vector3( 0.5, 2.8,  2.8),
  new THREE.Vector3(-1.0, 2.7,  2.5),
  new THREE.Vector3(-2.5, 2.2,  1.8),
  new THREE.Vector3(-3.2, 2.6,  1.0),
  new THREE.Vector3(-3.4, 3.5,  0.2),
  new THREE.Vector3(-2.6, 3.6, -0.4),
  new THREE.Vector3(-1.4, 4.0, -0.8),
  new THREE.Vector3(-0.8, 5.0, -1.2),
  new THREE.Vector3(-0.5, 5.8, -1.6),
];
const TC = new THREE.CatmullRomCurve3(TP);

const dotN = 55;
const dotG = new THREE.CylinderGeometry(0.09, 0.09, 0.03, 8);
const dotMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
const dotI = new THREE.InstancedMesh(dotG, dotMat, dotN);
dotI.castShadow = true;
{
  const o = new THREE.Object3D();
  for (let i = 0; i < dotN; i++) {
    const t = (i + 0.5) / dotN;
    const p = TC.getPointAt(Math.min(t, 0.999));
    o.position.copy(p);
    o.scale.set(1, 1, 1);
    o.updateMatrix();
    dotI.setMatrixAt(i, o.matrix);
  }
  dotI.instanceMatrix.needsUpdate = true;
}
G.add(dotI);

/* ════════════════════════════════════════════════════════════
   FLAGS — planted into the mountain surface
   ════════════════════════════════════════════════════════════ */
const pinHits = [];
const flags = [];

function mkFlag(pos, summit) {
  const g = new THREE.Group();
  const ph = summit ? 1.0 : 0.7;

  // Pole — sinks slightly into surface
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.045, ph, 8), mBr);
  pole.position.y = ph / 2 - 0.08;
  pole.castShadow = true;
  g.add(pole);

  // Pennant flag
  const fs = new THREE.Shape();
  fs.moveTo(0, 0);
  fs.lineTo(0.32, 0.09);
  fs.lineTo(0, 0.2);
  fs.closePath();
  const fl = new THREE.Mesh(new THREE.ShapeGeometry(fs), summit ? mGd : mRd);
  fl.position.set(0.04, ph * 0.55, 0);
  fl.castShadow = true;
  g.add(fl);
  flags.push(fl);

  if (summit) {
    const bl = new THREE.Mesh(new THREE.SphereGeometry(0.06, 10, 8), mGd);
    bl.position.y = ph - 0.02;
    bl.castShadow = true;
    g.add(bl);
  }

  g.position.copy(pos);
  G.add(g);

  // Hit sphere for click
  const ht = new THREE.Mesh(
    new THREE.SphereGeometry(0.7, 8, 6),
    new THREE.MeshBasicMaterial({ visible: false })
  );
  ht.position.copy(pos);
  ht.position.y += 0.5;
  G.add(ht);
  pinHits.push(ht);
}

S.forEach((s, i) => {
  s.hitIdx = i;
  mkFlag(s.pos, i === S.length - 1);
  pinHits[i].userData.idx = i;
});

/* ════════════════════════════════════════════════════════════
   TREES — chunky dark-green pines with snow blobs
   ════════════════════════════════════════════════════════════ */
function mkTree(x, y, z, h, dark) {
  const g = new THREE.Group();
  const mat = dark ? mG1 : mG2;
  const th = h * 0.25;

  // Trunk
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(h * 0.04, h * 0.06, th, 6), mBr);
  trunk.position.set(0, th / 2, 0);
  trunk.castShadow = true;
  g.add(trunk);

  // Lower foliage — wide cone
  const c1 = new THREE.Mesh(new THREE.ConeGeometry(h * 0.3, h * 0.4, 8), mat);
  c1.position.y = th + h * 0.18;
  c1.castShadow = true;
  g.add(c1);

  // Upper foliage
  const c2 = new THREE.Mesh(new THREE.ConeGeometry(h * 0.22, h * 0.34, 8), mat);
  c2.position.y = th + h * 0.42;
  c2.castShadow = true;
  g.add(c2);

  // Snow blob on tip
  const sw = new THREE.Mesh(new THREE.SphereGeometry(h * 0.14, 8, 6), mW);
  sw.scale.y = 0.55;
  sw.position.y = th + h * 0.56;
  g.add(sw);

  g.position.set(x, y, z);
  G.add(g);
}

// Trees placed on the snowy hills
mkTree(-2.2, 2.6, 2.8, 1.0, true);
mkTree(-0.8, 2.9, 3.2, 0.85, false);
mkTree( 0.6, 2.7, 3.3, 0.9, true);
mkTree( 1.8, 2.0, 3.0, 0.8, false);
mkTree( 3.0, 1.2, 2.5, 0.75, true);
mkTree(-3.6, 1.5, 2.0, 0.9, false);
mkTree(-1.5, 2.5, 1.8, 0.8, true);
mkTree( 0.8, 2.1, 1.2, 0.7, false);
mkTree(-2.8, 2.0, 1.2, 0.75, true);
mkTree( 1.5, 1.0, 0.5, 0.7, false);

/* ════════════════════════════════════════════════════════════
   INTERACTION
   ════════════════════════════════════════════════════════════ */
const ray = new THREE.Raycaster();
const ms = new THREE.Vector2();
let active = -1, zoomed = false;

cv.addEventListener('pointermove', e => {
  ms.x = (e.clientX / innerWidth) * 2 - 1;
  ms.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(ms, cam);
  cv.style.cursor = ray.intersectObjects(pinHits).length ? 'pointer' : 'grab';
});

cv.addEventListener('click', e => {
  ms.x = (e.clientX / innerWidth) * 2 - 1;
  ms.y = -(e.clientY / innerHeight) * 2 + 1;
  ray.setFromCamera(ms, cam);
  const h = ray.intersectObjects(pinHits);
  if (h.length) zoomTo(h[0].object.userData.idx);
});

function zoomTo(i) {
  gsap.killTweensOf(cam.position);
  gsap.killTweensOf(oc.target);
  active = i; zoomed = true;
  document.body.classList.add('z');
  oc.enabled = false;

  const wp = new THREE.Vector3();
  pinHits[i].getWorldPosition(wp);

  const dir = new THREE.Vector3(wp.x, 0, wp.z).normalize();
  const cp = new THREE.Vector3(
    wp.x + dir.x * 3.5 + 1.5,
    wp.y + 1.5,
    wp.z + dir.z * 3.5 + 1.5
  );
  const lk = wp.clone(); lk.y += 0.2;

  gsap.to(cam.position, { x: cp.x, y: cp.y, z: cp.z, duration: 1.2, ease: 'power2.inOut' });
  gsap.to(oc.target, { x: lk.x, y: lk.y, z: lk.z, duration: 1.2, ease: 'power2.inOut' });

  document.querySelectorAll('.dt').forEach((d, j) => d.classList.toggle('a', j === i));
  showCard(i);
}

function overview() {
  gsap.killTweensOf(cam.position);
  gsap.killTweensOf(oc.target);
  zoomed = false; active = -1;
  document.body.classList.remove('z');

  gsap.to(cam.position, { x: OVP.x, y: OVP.y, z: OVP.z, duration: 1.2, ease: 'power2.inOut', onComplete() { oc.enabled = true } });
  gsap.to(oc.target, { x: OVT.x, y: OVT.y, z: OVT.z, duration: 1.2, ease: 'power2.inOut' });

  document.querySelectorAll('.dt').forEach(d => d.classList.remove('a'));
  hideCard();
}

/* ── Card ── */
const card = document.getElementById('infoCard');
const eN = document.getElementById('cN'), eT = document.getElementById('cT');
const eP = document.getElementById('cP'), eD = document.getElementById('cD');
const eX = document.getElementById('cX');
const bP = document.getElementById('bP'), bN = document.getElementById('bN'), bC = document.getElementById('bC');

function showCard(i) {
  const s = S[i];
  eN.textContent = 'Stage ' + s.id; eT.textContent = s.n;
  eP.textContent = s.p; eD.textContent = s.d; eX.textContent = s.x;
  bP.disabled = i === 0; bN.disabled = i === S.length - 1;
  gsap.to(card, { opacity: 1, x: 0, duration: 0.45, delay: 0.5, ease: 'power2.out',
    onStart() { card.classList.add('vis') } });
}
function hideCard() {
  gsap.to(card, { opacity: 0, x: 46, duration: 0.28, ease: 'power2.in',
    onComplete() { card.classList.remove('vis') } });
}

bC.addEventListener('click', overview);
bP.addEventListener('click', () => { if (active > 0) { hideCard(); setTimeout(() => zoomTo(active - 1), 300) } });
bN.addEventListener('click', () => { if (active < S.length - 1) { hideCard(); setTimeout(() => zoomTo(active + 1), 300) } });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && zoomed) overview();
  if (e.key === 'ArrowRight' && zoomed && active < S.length - 1) { hideCard(); setTimeout(() => zoomTo(active + 1), 300) }
  if (e.key === 'ArrowLeft' && zoomed && active > 0) { hideCard(); setTimeout(() => zoomTo(active - 1), 300) }
});
document.querySelectorAll('.dt').forEach(d => d.addEventListener('click', () => zoomTo(parseInt(d.dataset.i))));

/* ── Labels ── */
const lblEl = document.getElementById('lbl');
S.forEach((s, i) => {
  const el = document.createElement('div');
  el.className = 'pl';
  el.innerHTML = '<span data-i="' + i + '">' + s.id + ' · ' + s.n + '</span>';
  lblEl.appendChild(el);
  s.el = el;
  el.querySelector('span').addEventListener('click', () => zoomTo(i));
});

const _v = new THREE.Vector3();
function updLbl() {
  S.forEach((s, i) => {
    pinHits[i].getWorldPosition(_v);
    _v.y += 0.7;
    const p = _v.clone().project(cam);
    if (p.z >= 1) { s.el.style.opacity = '0'; return }
    s.el.style.left = ((p.x * .5 + .5) * innerWidth) + 'px';
    s.el.style.top = ((-p.y * .5 + .5) * innerHeight) + 'px';
    s.el.style.transform = 'translate(-50%,-100%)';
    s.el.style.opacity = zoomed ? '0' : '1';
  });
}

/* ── Resize ── */
window.addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  R.setSize(innerWidth, innerHeight);
});

/* ── Entrance ── */
G.scale.setScalar(0);
G.rotation.y = -0.4;
gsap.to(G.scale, { x: 1, y: 1, z: 1, duration: 1.4, ease: 'elastic.out(1,0.65)', delay: 0.15 });
gsap.to(G.rotation, { y: 0, duration: 1.4, ease: 'power3.out', delay: 0.15 });

/* ── Render ── */
const ck = new THREE.Clock();
(function anim() {
  requestAnimationFrame(anim);
  const et = ck.getElapsedTime();

  if (!zoomed) G.rotation.y += 0.0012;

  // Flag flutter
  flags.forEach((f, i) => {
    f.rotation.y = -0.3 + Math.sin(et * 2.8 + i * 1.4) * 0.15;
  });

  oc.update();
  updLbl();
  R.render(scene, cam);
})();
</script>
</body>
</html>
