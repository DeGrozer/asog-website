<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>ASOG TBI | System Maintenance</title>
  <style>
    :root {
      --asog-navy: #03558C;
      --asog-gold: #F8AF21;
      --asog-ink: #0D2436;
      --paper: #f7f6f2;
      --grid-line: rgba(3, 85, 140, 0.1);
      --frame-dark: #12334c;
      --line: rgba(3, 85, 140, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100vh;
      margin: 0;
      font-family: "DM Sans", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--asog-ink);
      background-color: var(--paper);
      background-image:
        linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px);
      background-size: 34px 34px;
    }

    .wrap {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(16px, 4vw, 36px);
    }

    .content {
      width: min(760px, 100%);
      display: grid;
      justify-items: center;
      gap: 18px;
      text-align: center;
    }

    .figure-wrap {
      display: grid;
      place-items: center;
      width: min(390px, 100%);
      border: 0;
      border-radius: 0;
      background: transparent;
      padding: 0;
    }

    .figure-wrap img {
      width: min(100%, 340px);
      height: auto;
      object-fit: contain;
    }

    h1 {
      font-family: "DM Serif Display", Georgia, "Times New Roman", serif;
      color: #0b2e49;
      margin: 4px 0 0;
      line-height: 1.12;
      font-size: clamp(1.76rem, 4.3vw, 2.7rem);
      letter-spacing: -0.01em;
      max-width: 18ch;
    }

    .lead {
      margin-top: -2px;
      margin-bottom: 0;
      font-size: clamp(1rem, 1.9vw, 1.16rem);
      line-height: 1.5;
      max-width: 32ch;
      color: #1b4d6f;
    }

    .divider {
      width: 80px;
      height: 2px;
      border-radius: 999px;
      margin: 6px 0 2px;
      background: var(--asog-gold);
    }

    .note {
      margin: 0;
      color: #3b6886;
      font-size: 0.98rem;
      line-height: 1.6;
      max-width: 52ch;
    }

    @media (max-width: 640px) {
      .content {
        gap: 14px;
      }

      .figure-wrap {
        width: min(340px, 100%);
      }

      h1 {
        font-size: clamp(1.5rem, 8vw, 2rem);
      }
    }
  </style>
</head>
<body>
  <main class="wrap" role="main" aria-labelledby="maintenance-title">
    <section class="content">
      <div class="figure-wrap">
        <img src="assets/img/maintenance/trail-marker-hiker.png" alt="Maintenance illustration">
      </div>

      <h1 id="maintenance-title">Someone probably moved the trail marker.</h1>
      <p class="lead">We'll resume the climb shortly.</p>

      <div class="divider" aria-hidden="true"></div>
      <p class="note">Our team is currently performing system maintenance to improve your experience.</p>
    </section>
  </main>
</body>
</html>
